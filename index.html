<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
</head>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f4f4f4;
    color:#333;
    line-height:1.6;
}

header{
    background:#1f2937;
    color:white;
    padding:15px 50px;
}

nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

nav ul{
    display:flex;
    list-style:none;
}

nav li{
    margin-left:25px;
}

nav a{
    color:white;
    text-decoration:none;
    transition:.3s;
}

nav a:hover{
    color:#60a5fa;
}

.hero{
    display:flex;
    justify-content:space-around;
    align-items:center;
    min-height:80vh;
    padding:40px;
    flex-wrap:wrap;
}

.hero-text{
    max-width:500px;
}

.hero-text h1{
    font-size:48px;
    margin-bottom:20px;
}

.hero-text span{
    color:#2563eb;
}

.hero-text p{
    margin-bottom:30px;
}

.hero-image img{
    width:320px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,.2);
}

.btn{
    display:inline-block;
    background:#2563eb;
    color:white;
    padding:12px 25px;
    border-radius:6px;
    text-decoration:none;
}

.btn:hover{
    background:#1d4ed8;
}

.container{
    width:85%;
    margin:auto;
    padding:50px 0;
}

.about{
    display:flex;
    gap:40px;
    margin-top:30px;
    flex-wrap:wrap;
}

.about img{
    width:250px;
    border-radius:10px;
}

table{
    margin-top:20px;
}

table td{
    padding:8px 15px;
}

.card{
    background:white;
    margin:25px 0;
    padding:25px;
    border-radius:10px;
    box-shadow:0 3px 10px rgba(0,0,0,.1);
}

.card img{
    width:100%;
    max-width:400px;
    margin:20px 0;
}

footer{
    background:#1f2937;
    color:white;
    text-align:center;
    padding:15px;
    margin-top:40px;
}

@media(max-width:768px){

.hero{
    flex-direction:column;
    text-align:center;
}

nav{
    flex-direction:column;
}

nav ul{
    margin-top:15px;
}

.about{
    flex-direction:column;
    align-items:center;
}

.hero-text h1{
    font-size:36px;
}

}

ul {
    padding-left: 20px;
}
</style>


<body>

<header>
    <nav>
        <h2>Portfolio.gym</h2>

        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About Me</a></li>
            <li><a href="portfolio.html">Portfolio</a></li>
        </ul>
    </nav>
</header>

<section class="hero">

    <div class="hero-text">
        <h1>Hello, I'm <span>Gymuel</span></h1>

        <p>
            I'm into something. 
            Not quite sure yet, but I'm working on finding it out.
	    I'm indecisive when it comes to these stuff. Please don't 	  	    judge. :)
        </p>

        <a href="portfolio.html" class="btn">
            View Portfolio
        </a>

    </div>

    <div class="hero-image">
        <img src="res/gradpic.jpg" alt="Graduation Picture">
    </div>

</section>

<footer>
    <p>&copy; 2026 Gymuel De Guzman</p>
</footer>

</body>
</html>
